name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Show versions
        run: |
          python -c "import sys,mcp,anthropic,langgraph,pydantic; print('py',sys.version.split()[0]); print('mcp',mcp.__version__ if hasattr(mcp,'__version__') else '?'); print('anthropic',anthropic.__version__); print('langgraph',langgraph.__version__ if hasattr(langgraph,'__version__') else '?'); print('pydantic',pydantic.VERSION)"

      - name: Test
        run: pytest -q
